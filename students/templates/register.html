{%extends 'base.html'%}
{%block main%}
<div class="container">
    {{success}}
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h2>Register</h2>
            <form action="register" method="POST" >
                {%csrf_token%}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                  <label for="name" class="form-label">First Name</label>
                  <input type="text" class="form-control" id="name" name="first_name" required>
              </div>
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required>
                </div>
                <div class="mb-3">
                    <label for="reg_no" class="form-label">reg_no</label>
                    <input type="text" class="form-control" id="reg_no" name="reg_no" required>
                </div>
            <div class="mb-3">
                <label for="course" class="form-label">Program</label>
                <input type="text" class="form-control" id="course" name="program" required>
            </div>            
            <div>
                <label for="phone">phone Number</label>
                <input type="number" class="form-control" id="phone" name="phone" required>
            </div>
                <div class="mb-3">
                    <label for="email" class="form-label">email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password1" required>
                </div>
                <div class="mb-3">
                    <label for="password2" class="form-label
                    ">Confirm Password</label>
                    <input type="password" class="form-control" id="password2" name="password2" required>
                </div>

              <div class="mb-3">
                <label for="year_of_study" class="form-label">year_of_study</label>
                <input type="text" class="form-control" id="year_of_study" name="year_of_study" required>
            </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p>{{error_message}}</p>
        </div>
    </div>
</div>
{%endblock%}
