{%extends 'base.html'%}
{%block main%}
<div class="container">
  <h3>make your honest Review</h3>
  <form method="POST" >
    {% csrf_token %}
    <div class="mb-3">
      <label for="lecturerName" class="form-label">Lecturer Name</label>
      <input type="text" class="form-control" id="lecturerName" name="lecturer_name" required>
    </div>
    <div class="mb-3">
      <label for="studentName" class="form-label">stundent Name</label>
      <input type="text" class="form-control" id="lecturerName" name="student_name" required>
    </div>
    <div class="mb-3">
      <label for="comments" class="form-label">Your Comments</label>
      <textarea class="form-control" id="comments" name="comments" rows="3" required></textarea>
    </div>
    <div class="mb-3">
      <label for="reviewDate" class="form-label">Date Reviewed</label>
      <input type="date" class="form-control" id="reviewDate" name="review_date" required>
    </div>
    <div class="mb-3">
      <label for="rating" class="form-label">Rating (out of 10)</label>
      <input type="number" class="form-control" id="rating" name="rating" min="1" max="10" required>
    </div>
    <button type="submit" class="btn btn-primary">Submit Review</button>
  </form>
  <p>{{error}}</p>
  <p>{{success}}</p>
</div>

{%endblock%}
