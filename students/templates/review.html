{% extends 'base.html' %}

{% block main %}
<div class="container centered-form">
    <div class="form-container">
        <h3 class="text-center">Make Your Honest Review</h3>
        <form method="POST">
            {% csrf_token %}
            <p>{{ success }}</p>
            <div class="mb-3">
                <label for="lecturerName" class="form-label">Lecturer Name. i.e (DR.Mary)</label>
                <input type="text" class="form-control" id="lecturerName" name="lecturer_name" required>
            </div>
            <div class="mb-3">
                <label for="studentName" class="form-label">Your first name</label>
                <input type="text" class="form-control" id="studentName" name="student_name" required>
            </div>
            <div class="mb-3">
                <label for="comments" class="form-label">Your Comments</label>
                <textarea class="form-control" id="comments" name="comments" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="reviewDate" class="form-label">Date Reviewed</label>
                <input type="date" class="form-control" id="reviewDate" name="review_date" required>
            </div>
            <div class="mb-3">
                <label for="rating" class="form-label">Rating (out of 10)</label>
                <input type="number" class="form-control" id="rating" name="rating" min="1" max="10" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit Review</button>
        </form>
        <p>{{ error }}</p>
    </div>
</div>
{% endblock %}
